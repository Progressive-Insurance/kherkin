buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

plugins {
    alias libs.plugins.jfrog
    alias libs.plugins.com.android.library
    alias libs.plugins.kotlin.android
    id 'maven-publish'
    id 'signing'
}

android {
    namespace 'com.progressive.kherkin.compose'
    compileSdk 34

    publishing {
        singleVariant("release") {
            withSourcesJar()
            withJavadocJar()
        }
    }

    defaultConfig {
        minSdk 24
        targetSdk 34
        versionName getVersionName()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    def composeBom = platform(libs.compose.bom)
    implementation composeBom
    androidTestImplementation composeBom
    implementation libs.androidx.appcompat
    implementation libs.material
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    api(libs.compose.test)
    api(libs.compose.testing)
    api(project(':common'))
}

ext.isReleaseVersion = !version.endsWith("SNAPSHOT")

signing {
    required = { isReleaseVersion && gradle.taskGraph.hasTask("publish") }
    sign publishing.publications.aarCompose
}

publishing {
    publications {
        aarCompose(MavenPublication) {
            groupId 'com.progressive.kherkin'
            artifactId 'kherkin-compose'
            version = '1.0.0'

            afterEvaluate {
                from components.release
            }
        }
    }
}

artifactoryPublish {
    publications(publishing.publications.aarCompose)
}